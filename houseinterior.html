<head>

    <title2>A Poetry Archive by: Luke West</title2>
    <title> You're in the Interior Now </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        title2 {
            font-family: Garamond, serif;
        }

         body {
            background-image: 
                url("https://cdn.corenexis.com/files/c/7317781720.png"),
                url("https://cdn.corenexis.com/files/c/2137773720.jpg");
            background-repeat: no-repeat, no-repeat;
            background-position: 50% 60%, center;
            background-attachment: fixed, fixed;
            background-size:400%, 200%;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Header with glitter effect */
        .header {
            background-image: 
                url("https://cdn.corenexis.com/files/c/3436494720.png"),
                url("https://cdn.corenexis.com/files/c/3436494720.png"),
                url("https://cdn.corenexis.com/files/c/7317781720.png");
           background-color: #548940bb;
            background-size: 50px 50px;
            background-repeat: no-repeat, no-repeat, repeat-x;
            background-position: bottom left, bottom right, bottom;
            border: 5px solid #142e05;
            border-radius: 20px;
            padding: 20px;
            margin: 40px;
            text-align: center;
            box-shadow: 0 0 20px rgba(1, 1, 0, 0.5);
            animation: glow 3s ease-in-out infinite;
            position:relative;
             z-index: 10;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(36, 4, 4, 0.868); }
            50% { box-shadow: 0 0 40px rgba(255, 255, 255, 0.6); }
        }

        .spikeybubble {
            position: fixed;
            top: 20%;
            left: 0%;
            z-index: 5;
            width: 50%;
            height: 50%;
        }

     .bg-anchored-button4 {
    position: fixed;
    display: inline-block; /* Makes the link behave like a button */
    background: transparent;
    Left: 60%;
    bottom: 1%;
    border: none; /* Removes default border */
    padding: 0px; /* Adds space around the image */
    z-index: 10;
    cursor: crosshair; 
}

.bg-anchored-button4:hover {
    max-width: 110%; /* Ensures the image is responsive */
    height: auto; /* Maintains aspect ratio */
        filter:
            drop-shadow(0 0 6px rgba(71, 160, 24, 0.998))
    drop-shadow(0 0 14px rgba(139, 80, 17, 0.732))
    drop-shadow(0 0 28px rgba(255,120,50,0.35));
  transform: scale(1.03);
}  
    
.bg-anchored-button4 img {
    max-width: 100%; /* Ensures the image is responsive */
    height: 200%; /* Maintains aspect ratio */
    width: 450px;
    height: 450px;
}

p2 {
    color: #5eaebc;
    position: fixed;
    font-size: 1.4rem;
    text-align: center;
    margin: 20px 0;
    text-shadow: 0 0 8px rgba(255, 200, 255, 0.5);
    max-width: 40%;
    padding-top:1%;
    padding-left: 15%;
    z-index: 15;
}

</style>

 <!-- Header -->
    <div class="header">
        <h1> ~ Welcome In! ~ </h1>
        <p> Squash or Save the Spiders, your choice!</p>
